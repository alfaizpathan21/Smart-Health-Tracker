<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Health Tracker - Registration</title>
<style>
:root {
  --bg: #081426;
  --panel: rgba(255,255,255,0.1);
  --panel-strong: rgba(255,255,255,0.18);
  --accent: #3da8ff;
}
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #041025 0%, #071a34 50%, #091f3d 100%);
  color: white;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.page-shell {
  width: min(460px, 92vw);
  padding: 34px;
  border-radius: 32px;
  background: radial-gradient(circle at top right, rgba(61,168,255,0.15), transparent 36%),
              rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.14);
  box-shadow: 0 30px 90px rgba(0,0,0,0.35);
}
.page-header {
  text-align: center;
  margin-bottom: 24px;
}
.page-header h1 {
  margin: 0;
  font-size: 2rem;
}
.page-header p {
  margin: 10px auto 0;
  max-width: 320px;
  color: rgba(255,255,255,0.75);
}
.form-card {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 28px;
  padding: 28px;
  backdrop-filter: blur(20px);
}
.field {
  position: relative;
  margin-bottom: 18px;
}
.field input {
  width: 100%;
  padding: 16px 16px 14px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color: #eff6ff;
  outline: none;
}
.field label {
  position: absolute;
  top: 14px;
  left: 16px;
  color: rgba(255,255,255,0.7);
  pointer-events: none;
  transition: transform 0.2s ease, font-size 0.2s ease;
}
.field input:focus + label,
.field input:not(:placeholder-shown) + label {
  transform: translateY(-26px);
  font-size: 0.78rem;
  color: rgba(255,255,255,0.9);
}
.field input::placeholder {
  color: transparent;
}
button {
  width: 100%;
  padding: 16px;
  margin-top: 8px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #3da8ff, #0d47a1);
  color: white;
  font-size: 1rem;
  cursor: pointer;
  transition: transform 0.24s ease, box-shadow 0.24s ease;
}
button:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 34px rgba(61,168,255,0.24);
}
.feedback {
  margin-top: 15px;
  color: rgba(255,255,255,0.78);
  font-size: 0.95rem;
  text-align: center;
}
.feedback a {
  color: #a8d9ff;
  text-decoration: none;
  font-weight: 700;
}
.strength {
  margin-top: 8px;
  font-size: 0.9rem;
  color: rgba(255,255,255,0.72);
}
.strength span {
  font-weight: 700;
  color: #a8d9ff;
}
</style>
</head>
<body>
<div class="page-shell">
  <header class="page-header">
    <h1>💙 Smart Health Tracker</h1>
    <p>Create an account and step into a next-gen health ecosystem.</p>
  </header>
  <section class="form-card">
    <div class="field">
      <input id="name" type="text" placeholder="Full Name" autocomplete="name">
      <label for="name">Full Name</label>
    </div>
    <div class="field">
      <input id="email" type="email" placeholder="Email" autocomplete="email">
      <label for="email">Email</label>
    </div>
    <div class="field">
      <input id="username" type="text" placeholder="Username" autocomplete="username">
      <label for="username">Username</label>
    </div>
    <div class="field">
      <input id="password" type="password" placeholder="Password" autocomplete="new-password" oninput="updateStrength()">
      <label for="password">Password</label>
    </div>
    <div class="field">
      <input id="confirm" type="password" placeholder="Confirm Password" autocomplete="new-password">
      <label for="confirm">Confirm Password</label>
    </div>
    <div class="strength">Password strength: <span id="strengthText">Enter a password</span></div>
    <button onclick="registerUser()">Register</button>
    <div class="feedback">Already have an account? <a href="newindex.html">Login</a></div>
  </section>
</div>
<script>
function updateStrength() {
  const value = document.getElementById('password').value;
  const strengthText = document.getElementById('strengthText');
  if (!value) {
    strengthText.textContent = 'Enter a password';
    return;
  }
  let score = 0;
  if (value.length >= 8) score += 1;
  if (/[A-Z]/.test(value)) score += 1;
  if (/[0-9]/.test(value)) score += 1;
  if (/[^A-Za-z0-9]/.test(value)) score += 1;
  const map = ['Weak', 'Fair', 'Good', 'Strong', 'Excellent'];
  strengthText.textContent = map[score];
}
function registerUser() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  if (!name || !email || !username || !password || !confirm) {
    alert('Please fill all fields.');
    return;
  }
  if (password !== confirm) {
    alert('Passwords do not match.');
    return;
  }
  const user = {name, email, username};
  localStorage.setItem('smartHealthUser', JSON.stringify(user));
  alert('Registration successful!');
  window.location = 'newindex.html';
}
</script>
</body>
</html>
